name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/*"

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest
    
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: sqlite:///ci.db

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin    

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Verify Flask App Imports
        run: |
          cd app
          python -c "import app"

      - name: Build Docker Image
        run: run: docker build -t ghcr.io/${{ github.repository }}/flask-devsecops-app:latest -f docker/Dockerfile .
          
      - name: Push Docker Image
        run: docker push ghcr.io/${{ github.repository }}/flask-devsecops-app:latest    
