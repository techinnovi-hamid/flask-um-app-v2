name: CI Pipeline

on:
  push:
    branches:
      - develop
      - feature/*
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read        # for checkout
      packages: write       # to push Docker image to GHCR

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/flask-devsecops-app:latest \
            -f docker/Dockerfile .

      # 5️⃣ Run Trivy Vulnerability Scan
      - name: Container Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/flask-devsecops-app:latest
          format: table
          exit-code: 1          # fail job if HIGH or CRITICAL vulnerabilities
          severity: CRITICAL

      # 6️⃣ Push Docker Image to GHCR
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}/flask-devsecops-app:latest
