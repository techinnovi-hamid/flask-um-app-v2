name: CI-Pipeline

on: 
  push: 
    branches: 
      - develop
      - feature/*
  
  pull_request:
    branches: 
      - develop
 
jobs: 
  
  tests: 
    
    runs-on: ubuntu-latest

    steps: 
      
      - name: Checkout repository
        uses: actions/checkout@v4
       
      - name: Setup Python 
        uses: actions/setup-python@v5

      - name: Install dependies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

  
