
name: DevSecOps security scan 

on: 
  pull_request: 
  push: 
    branches: 
      - develop:  
jobs: 
  gitleaks: 
    runs-on: ubuntu-latest

    steps: 
      - name: Check Repository 
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with: 
           args: detect --source . --verbose
