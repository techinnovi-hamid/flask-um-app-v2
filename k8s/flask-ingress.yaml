apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: 
  name: flask-ingress
  namespace: devops-project
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec: 
  ingressClassName: nginx
  rules: 
    - host: flask.local
      http: 
        paths: 
          - path: /
            pathType: Prefix
            backend: 
              service:
                name: flask-service
                port: 
                  number: 5000
